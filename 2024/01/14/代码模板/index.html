                <h1 id="图论"><a href="#图论" class="headerlink" title="图论"></a>图论</h1><h2 id="Dijkstra"><a href="#Dijkstra" class="headerlink" title="Dijkstra"></a>Dijkstra</h2><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><code class="hljs cpp">priority_queue&lt; pair&lt;<span class="hljs-type">int</span>,<span class="hljs-type">int</span>&gt; &gt;q;<br><span class="hljs-type">int</span> dis[N],vis[N];<br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">Dijkstra</span><span class="hljs-params">(<span class="hljs-type">int</span> S)</span></span><br><span class="hljs-function"></span>&#123;<br>	q.<span class="hljs-built_in">push</span>(<span class="hljs-built_in">make_pair</span>(<span class="hljs-number">0</span>,S));<br>	<span class="hljs-built_in">memset</span>(dis,<span class="hljs-number">0x3f</span>,<span class="hljs-keyword">sizeof</span> dis);<br>	<span class="hljs-built_in">memset</span>(vis,<span class="hljs-number">0</span>,<span class="hljs-keyword">sizeof</span> vis);<br>	<span class="hljs-keyword">while</span>(!q.<span class="hljs-built_in">empty</span>())<br>	&#123;<br>		<span class="hljs-type">int</span> x = q.top.<span class="hljs-built_in">second</span>();q.<span class="hljs-built_in">pop</span>();<br>		<span class="hljs-keyword">if</span>(vis[x]) <span class="hljs-keyword">continue</span>;<br>		<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i = head[x];i;i = nxt[i])<br>		&#123;<br>			<span class="hljs-type">int</span> v = to[i],w = val[i];<br>			<span class="hljs-keyword">if</span>(dis[v] &gt; dis[x] + w)<br>				dis[v] = dis[x] + w,q.<span class="hljs-built_in">push</span>(<span class="hljs-built_in">make_pair</span>(-dis[v],v));<br>		&#125;<br>	&#125;<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="SPFA"><a href="#SPFA" class="headerlink" title="SPFA"></a>SPFA</h2><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><code class="hljs cpp"><span class="hljs-type">int</span> dis[N],vis[N];<br>queue&lt;<span class="hljs-type">int</span>&gt; Q;<br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">spfa</span><span class="hljs-params">(<span class="hljs-type">int</span> S)</span><span class="hljs-comment">//负环 bool spfa(int S)</span></span><br><span class="hljs-function"></span>&#123;<br>	<span class="hljs-built_in">memset</span>(dis,<span class="hljs-number">0x3f</span>,<span class="hljs-keyword">sizeof</span> dis);<br>	<span class="hljs-built_in">memset</span>(vis,<span class="hljs-number">0</span>,<span class="hljs-keyword">sizeof</span> vis);<br>    <span class="hljs-comment">//memset(pass,0,sizeof(pass));</span><br>	<span class="hljs-keyword">while</span>(!Q.<span class="hljs-built_in">empty</span>()) Q.<span class="hljs-built_in">pop</span>();<br>	Q.<span class="hljs-built_in">push</span>(S),dis[S] = <span class="hljs-number">0</span>,vis[S] = <span class="hljs-number">1</span>;<br>	<span class="hljs-keyword">while</span>(!Q.<span class="hljs-built_in">empty</span>())<br>	&#123;<br>		<span class="hljs-type">int</span> x =Q.<span class="hljs-built_in">top</span>();<br>		Q.<span class="hljs-built_in">pop</span>();<br>		vis[x] = <span class="hljs-number">0</span>;<br>		<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i = head[x];i;i = nxt[i])<br>		&#123;<br>			<span class="hljs-type">int</span> v = to[i],w = val[i];<br>			<span class="hljs-keyword">if</span>(dis[v] &gt; dis[x] + w) <br>			&#123;<br>				dis[v] = dis[x] + w;<br>                <span class="hljs-comment">/*pass[v]=pass[X]+1; </span><br><span class="hljs-comment">				if(pass[v]&gt;n) return true;*/</span><br>				<span class="hljs-keyword">if</span>(!vis[v])<br>					vis[v] = <span class="hljs-number">1</span>,Q.<span class="hljs-built_in">push</span>(v);<br>			&#125;<br>		&#125;<br>	&#125;<br>&#125;<br></code></pre></td></tr></table></figure>

<h2 id="LCA-倍增"><a href="#LCA-倍增" class="headerlink" title="LCA(倍增)"></a>LCA(倍增)</h2><figure class="highlight cpp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br></pre></td><td class="code"><pre><code class="hljs cpp"><span class="hljs-comment">//lca 倍增 </span><br><span class="hljs-comment">//板子 洛谷p3379 </span><br><span class="hljs-meta">#<span class="hljs-keyword">include</span> <span class="hljs-string">&lt;bits/stdc++.h&gt;</span></span><br><span class="hljs-meta">#<span class="hljs-keyword">define</span> N 500100</span><br><span class="hljs-keyword">using</span> <span class="hljs-keyword">namespace</span> std;<br><span class="hljs-type">int</span> head[N];<br><span class="hljs-type">int</span> cnt;<br><span class="hljs-keyword">struct</span> <span class="hljs-title class_">edge</span>&#123;<br>	<span class="hljs-type">int</span> nxt,to;<br>&#125;e[N&lt;&lt;<span class="hljs-number">1</span>];<span class="hljs-comment">//双向边 </span><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">add</span><span class="hljs-params">(<span class="hljs-type">int</span> x,<span class="hljs-type">int</span> y)</span></span><br><span class="hljs-function"></span>&#123;<br>	e[++cnt].nxt=head[x];<br>	e[cnt].to=y;<br>	head[x]=cnt;<br>&#125;<br><span class="hljs-type">int</span> d[N];<span class="hljs-comment">//深度 </span><br><span class="hljs-type">int</span> fa[N][<span class="hljs-number">22</span>];<span class="hljs-comment">//fa[i][j]代表i的2^j祖先 </span><br><span class="hljs-type">int</span> lg[N];<span class="hljs-comment">//log_2(N)</span><br><span class="hljs-function"><span class="hljs-type">void</span> <span class="hljs-title">dfs</span><span class="hljs-params">(<span class="hljs-type">int</span> now,<span class="hljs-type">int</span> fath)</span><span class="hljs-comment">//预处理，now当前点，fath为它的父节点 </span></span><br><span class="hljs-function"></span>&#123;<br>	fa[now][<span class="hljs-number">0</span>]=fath;<br>	d[now]=d[fath]+<span class="hljs-number">1</span>;<br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i=<span class="hljs-number">1</span>;i&lt;=lg[d[now]];i++)<br>	&#123;<br>		<span class="hljs-comment">//递推式 </span><br>		fa[now][i]=fa[fa[now][i<span class="hljs-number">-1</span>]][i<span class="hljs-number">-1</span>];<span class="hljs-comment">//意思是now的2^i祖先等于now的2^(i-1)祖先的2^(i-1)祖先</span><br>		<span class="hljs-comment">//2^i = 2^(i-1) + 2^(i-1)</span><br>	&#125;<br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i=head[now];i;i=e[i].nxt)<br>	&#123;<br>		<span class="hljs-keyword">if</span>(e[i].to!=fath) <span class="hljs-built_in">dfs</span>(e[i].to,now);<span class="hljs-comment">//遍历出边进行预处理 </span><br>	&#125;<br>&#125;<br><span class="hljs-function"><span class="hljs-type">int</span> <span class="hljs-title">lca</span><span class="hljs-params">(<span class="hljs-type">int</span> x,<span class="hljs-type">int</span> y)</span></span><br><span class="hljs-function"></span>&#123;<br>	<span class="hljs-keyword">if</span>(d[x]&lt;d[y]) <span class="hljs-built_in">swap</span>(x,y);<span class="hljs-comment">//不妨设x的深度 &gt;= y的深度</span><br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> k=lg[d[x]]<span class="hljs-number">-1</span>;k&gt;=<span class="hljs-number">0</span>;k--)<br>	&#123;<br>		<span class="hljs-keyword">if</span>(d[fa[x][k]]&gt;=d[y]) x=fa[x][k];<span class="hljs-comment">//这里就是不断向上倍增，让x到和y一样的深度</span><br>		<span class="hljs-comment">//注意要从大到小枚举k，防止需要回溯一下的情况。	 </span><br>	&#125;<br>	<span class="hljs-keyword">if</span>(x==y) <span class="hljs-keyword">return</span> x;<br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> k=lg[d[x]]<span class="hljs-number">-1</span>;k&gt;=<span class="hljs-number">0</span>;k--)<span class="hljs-comment">//不断向上跳 </span><br>	&#123;<br>		<span class="hljs-keyword">if</span>(fa[x][k]!=fa[y][k])<span class="hljs-comment">//因为我们要跳到它们LCA的下面一层，所以它们肯定不相等，如果不相等就跳过去。</span><br>		&#123;<br>			x=fa[x][k];<br>			y=fa[y][k];<br>		&#125;<br>	&#125;<br>	<span class="hljs-keyword">return</span> fa[x][<span class="hljs-number">0</span>];<span class="hljs-comment">//返回父节点</span><br><br>&#125;<br><span class="hljs-function"><span class="hljs-type">int</span> <span class="hljs-title">main</span><span class="hljs-params">()</span></span><br><span class="hljs-function"></span>&#123;<br>	<span class="hljs-type">int</span> n,m,s;<span class="hljs-comment">//节点个数，询问次数，根节点编号 </span><br>	<span class="hljs-built_in">scanf</span>(<span class="hljs-string">&quot;%d%d%d&quot;</span>,&amp;n,&amp;m,&amp;s);<br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i=<span class="hljs-number">1</span>;i&lt;=n<span class="hljs-number">-1</span>;i++)<br>	&#123;<br>		<span class="hljs-type">int</span> x,y;<br>		<span class="hljs-built_in">scanf</span>(<span class="hljs-string">&quot;%d%d&quot;</span>,&amp;x,&amp;y);<br>		<span class="hljs-built_in">add</span>(x,y);<br>		<span class="hljs-built_in">add</span>(y,x);<br>	&#125;<br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i = <span class="hljs-number">1</span>; i &lt;= n; ++i)<br>        lg[i] = lg[i<span class="hljs-number">-1</span>] + (<span class="hljs-number">1</span> &lt;&lt; lg[i<span class="hljs-number">-1</span>] == i);<span class="hljs-comment">//这个是我抄的，暂时不懂，但是可以手算log_2(n) </span><br>	<span class="hljs-built_in">dfs</span>(s,<span class="hljs-number">0</span>); <br>	<span class="hljs-keyword">for</span>(<span class="hljs-type">int</span> i=<span class="hljs-number">1</span>;i&lt;=m;i++)<br>	&#123;<br>		<span class="hljs-type">int</span> a,b;<br>		<span class="hljs-built_in">scanf</span>(<span class="hljs-string">&quot;%d%d&quot;</span>,&amp;a,&amp;b);<br>		<span class="hljs-built_in">printf</span>(<span class="hljs-string">&quot;%d\n&quot;</span>,<span class="hljs-built_in">lca</span>(a,b));<br>	&#125; <br>	<span class="hljs-keyword">return</span> <span class="hljs-number">0</span>;<br>&#125;<br></code></pre></td></tr></table></figure>
