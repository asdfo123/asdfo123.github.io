                <h1 id="反馈信息"><a href="#反馈信息" class="headerlink" title="反馈信息"></a>反馈信息</h1><figure class="highlight scss"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs scss">Accepted. ————通过！(AC)<br>Wrong Answer.————答案错。(WA)<br>RunTime Error.——程序运行出错，意外终止等。(RTE)<br><span class="hljs-selector-tag">Time</span> Limit Exceeded. ——超时。程序没在规定时间内出答案。(TLE)<br>Presentation Error. ——格式错。程序没按规定的格式输出答案。(PE)<br>Memory Limit Exceeded. ——超内存。程序没在规定空间内出答案。(MLE)<br>Compile Error. ——编译错。程序编译不过。(CE)<br></code></pre></td></tr></table></figure>

<h1 id="A"><a href="#A" class="headerlink" title="A"></a>A</h1><figure class="highlight smali"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><code class="hljs smali">abbreviate    缩写  <br>acyclic       非循环的、非周期的<br>addition      附加<br>adjacent      相邻的<br>ambiguous     模糊的<br>ancestor      祖先<br>anticlockwise 逆时针<br>arbitrary     任意的<br>arc           弧<span class="hljs-built_in"></span><br><span class="hljs-built_in">array </span>        数组<br>assemble      组合<br>assess        评估<br>assume        假设，认为<br>attributes    属性<br>axis axes     轴<br></code></pre></td></tr></table></figure>

<h1 id="B"><a href="#B" class="headerlink" title="B"></a>B</h1><figure class="highlight mipsasm"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><code class="hljs mipsasm"><span class="hljs-keyword">base </span>         底边，幂的底数<br><span class="hljs-keyword">balanced	</span>  平衡<br><span class="hljs-keyword">balloon </span>      气球<br><span class="hljs-keyword">binary </span>       二进制<br><span class="hljs-keyword">bonus </span>        奖金<br><span class="hljs-keyword">boundary </span>     界限<br><span class="hljs-keyword">briefly </span>      简短的 <br></code></pre></td></tr></table></figure>

<h1 id="C"><a href="#C" class="headerlink" title="C"></a>C</h1><figure class="highlight maxima"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br></pre></td><td class="code"><pre><code class="hljs maxima">calculate     计算<br>carpet        地毯<br>categories    类别<br>chaotic       混乱的<br>chariot       战车<br>checkmate     挫败<br>circle        圆<br>clique        最大团<br>collinear     共线的<br><span class="hljs-built_in">columns</span>       列<br>comma         逗号<br>composition   作品<br><span class="hljs-built_in">compile</span>       汇编<br>concentrate   浓度，集中 <br>conditions    条件<br>consecutive   连续的<br>consistof     由....组成<br>constrain     约束<br>contain       包含<br>converge      汇聚<br>coordinates   坐标<br>corrupt       腐烂，破坏<br>courier       快递公司<br>cubes         立方<br>cubic         立方体的<br><span class="hljs-built_in">cylindrical</span>   圆柱<br></code></pre></td></tr></table></figure>

<h1 id="D"><a href="#D" class="headerlink" title="D"></a>D</h1><figure class="highlight mipsasm"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><code class="hljs mipsasm">decimal       十进制<br>define		  定义<br>deformed      变形的<br>denote        一套<br>denominator   分母<br>depth         深度<br>denote        象征<br>descentdant   子孙<br>destination   终点<br>determine     确定<br><span class="hljs-keyword">diagonal </span>     对角<br><span class="hljs-keyword">dial </span>         钟面，拨打<br><span class="hljs-keyword">diameter </span>     直径<br><span class="hljs-keyword">dictionaries </span> 字典<br><span class="hljs-keyword">difference </span>   差<br><span class="hljs-keyword">digit </span>        位数  数字；手指；足趾<br><span class="hljs-keyword">dimension </span>    纬度<br><span class="hljs-keyword">dimensional </span>  尺寸<br><span class="hljs-keyword">discuss </span>      讨论<br><span class="hljs-keyword">distinctvalues独一无二的值</span><br><span class="hljs-keyword"></span><span class="hljs-keyword">distributed </span>  分布式的<br><span class="hljs-keyword">divisor </span>      因子,分母<br>draw          平局<br>duplicated    复制<br></code></pre></td></tr></table></figure>

<h1 id="E"><a href="#E" class="headerlink" title="E"></a>E</h1><figure class="highlight gams"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><code class="hljs gams">efficiently   高效地<br>element       元素<br><span class="hljs-keyword">equation</span>      方程式 等式<br>equal         相等<br>encrypt       加密<br>endpoint      断点<br>even          偶数<br>expectation   期待<br>exponent      幂<br></code></pre></td></tr></table></figure>

<h1 id="F"><a href="#F" class="headerlink" title="F"></a>F</h1><figure class="highlight maxima"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><code class="hljs maxima"><span class="hljs-built_in">factorial</span>     阶乘<br><span class="hljs-built_in">feature</span>       特征<br>followby      跟随，其后<br>formally      正式的<br>fraction      分数，小数<br>front         队头<br></code></pre></td></tr></table></figure>

<h1 id="G"><a href="#G" class="headerlink" title="G"></a>G</h1><figure class="highlight verilog"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><code class="hljs verilog"><span class="hljs-keyword">generate</span>      产生<br>grid          网格；格栅；方格；（地图上的）坐标方格<br>grabh         图<br></code></pre></td></tr></table></figure>

<h1 id="H"><a href="#H" class="headerlink" title="H"></a>H</h1><figure class="highlight nginx"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs nginx"><span class="hljs-attribute">horizon</span>       地平线<br></code></pre></td></tr></table></figure>

<h1 id="I"><a href="#I" class="headerlink" title="I"></a>I</h1><figure class="highlight angelscript"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><code class="hljs angelscript">identical     完全相同的<br>incline       倾斜<br>indegree      入度<br>indent        缩进<br>indices       下标<br>inequality    不等式<br>infinite      无限的<br><span class="hljs-built_in">int</span>eger       整数<br><span class="hljs-built_in">int</span>ersect     相交<br><span class="hljs-built_in">int</span>erval      间隔<br>inverse       反向 <br>involution    内卷<br>irreducible   不可减少的<br></code></pre></td></tr></table></figure>

<h1 id="J"><a href="#J" class="headerlink" title="J"></a>J</h1><figure class="highlight mipsasm"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs mipsasm"><span class="hljs-keyword">justified </span>  合理的<br></code></pre></td></tr></table></figure>

<h1 id="K"><a href="#K" class="headerlink" title="K"></a>K</h1><figure class="highlight nginx"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><code class="hljs nginx"><span class="hljs-attribute">knight</span>    骑士(象棋）  <br></code></pre></td></tr></table></figure>

<h1 id="L"><a href="#L" class="headerlink" title="L"></a>L</h1><figure class="highlight ada"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><code class="hljs ada">labelled     贴标签于<br>letter       字母<br>liquid       液体<br><span class="hljs-keyword">loop</span>         环<br></code></pre></td></tr></table></figure>

<h1 id="M"><a href="#M" class="headerlink" title="M"></a>M</h1><figure class="highlight maxima"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><code class="hljs maxima">matching     匹配<br>matrices     矩阵<br>meadow       草坪<br><span class="hljs-built_in">mean</span>         平均值<br>minimalvolume最小体积<br><span class="hljs-built_in">minor</span>        较小的<br>multiset     多重集合<br>multiple     多种多样的<br></code></pre></td></tr></table></figure>
